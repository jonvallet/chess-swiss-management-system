# Spring Datasource Configurations (Defaults to zero-setup file-based H2 database in ./data/, override with Postgres env vars)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/chessdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# JPA / Hibernate Configurations
spring.jpa.database-platform=${SPRING_JPA_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configurations
spring.flyway.baseline-on-migrate=true

# Server Configuration
server.port=8080

# JWT Configuration
app.jwt.secret=${APP_JWT_SECRET:chess-swiss-management-secret-key-change-in-production-32chars-min}
app.jwt.expiration-ms=86400000

# Admin Credentials
app.admin.username=${APP_ADMIN_USERNAME:admin}
app.admin.password=${APP_ADMIN_PASSWORD:admin}

